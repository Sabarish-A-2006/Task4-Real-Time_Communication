<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SimpleVideoChat</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <!-- Login Screen -->
      <div id="login-screen">
        <h1>SimpleVideoChat</h1>
        <input type="text" id="username" placeholder="Your name" />
        <input
          type="text"
          id="room-id"
          placeholder="Room ID (leave empty to create new)"
        />
        <button id="join-btn">Join Room</button>
      </div>

      <!-- Video Room -->
      <div id="video-room" class="hidden">
        <div class="header">
          <h2 id="room-name">Room: Loading...</h2>
          <button id="leave-btn">
            <i class="fas fa-sign-out-alt"></i> Leave
          </button>
        </div>

        <div class="main">
          <div id="video-grid"></div>
          <video id="local-video" autoplay muted></video>
        </div>

        <div class="controls">
          <button id="video-btn" class="active">
            <i class="fas fa-video"></i>
          </button>
          <button id="audio-btn" class="active">
            <i class="fas fa-microphone"></i>
          </button>
          <button id="screen-btn"><i class="fas fa-desktop"></i></button>
          <button id="chat-toggle"><i class="fas fa-comment"></i></button>
        </div>

        <!-- Chat Panel -->
        <div id="chat-panel" class="hidden">
          <div id="chat-messages"></div>
          <div class="chat-input">
            <input
              type="text"
              id="message-input"
              placeholder="Type a message..."
            />
            <button id="send-btn"><i class="fas fa-paper-plane"></i></button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
